<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stellwagen Bank National Marine Sanctuary Home</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="js/main.js"></script>
    <link rel="stylesheet" href="static/css/images_css.css" />
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/navbar_css.css" />
  </head>
  <style>
    body {
      color: #c0c0c0; /* default text color for the page */
    }

    #chart-controls {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    #active-chart {
      margin-top: 1rem;
      width: 100%;
      height: 500px;
    }

    .max-y-input {
      width: 5rem;
    }
  </style>
  <body>
    <script type="text/javascript">
      navBar();
    </script>

    <div class="container-fluid mt-4">
      <h2 class="text-center">Phytoplankton Concentration Visualizations</h2>

      <div id="chart1" class="plotly-graph-container"></div>
      <div id="chart2" class="plotly-graph-container"></div>
      <div id="chart3" class="plotly-graph-container"></div>
      <div id="chart4" class="plotly-graph-container"></div>

      <div class="btn-group" role="group">
        <button class="btn btn-secondary" onclick="setChartType('bar')">
          Stacked Bar
        </button>
        <button class="btn btn-secondary" onclick="setChartType('line')">
          Trendline
        </button>
      </div>

      <div id="chart-controls"></div>
      <div id="active-chart"></div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <script src="static/js/dashboard.js"></script>
  </body>
</html>
