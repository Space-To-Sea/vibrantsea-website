<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stellwagen Bank National Marine Sanctuary Home</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="js/main.js"></script>
    <link rel="stylesheet" href="static/css/images_css.css" />
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/navbar_css.css" />
  </head>
  <style>
    .raindow-letters {
      font-size: 60px;
    }
    .rainbow-letters span:nth-child(10n + 1) {
      color: #ef5350;
    }

    .rainbow-letters span:nth-child(10n + 2) {
      color: #ff8800;
    }

    .rainbow-letters span:nth-child(10n + 3) {
      color: #f8f40c;
    }

    .rainbow-letters span:nth-child(10n + 5) {
      color: #25f00a;
    }

    .rainbow-letters span:nth-child(10n + 4) {
      color: #2196f3;
    }

    .rainbow-letters span:nth-child(10n + 6) {
      color: #00bcd4;
    }

    .rainbow-letters span:nth-child(10n + 7) {
      color: #9320c9;
    }

    .rainbow-letters span:nth-child(10n + 8) {
      color: #ff07ff;
    }
    .rainbow-letters span:nth-child(10n + 9) {
      color: #e7193c;
    }
    .rainbow-letters span:nth-child(10n + 10) {
      color: #e4a112;
    }

    .color-columns {
      width: 20%;
      padding: 15px;
    }

    .microorganism {
      height: 97px;
      font-size: 0.95vw;
    }

    .chlorophyll {
      height: 60px;
      font-size: 0.95vw;
    }

    .names {
      height: 90px;
      overflow-wrap: break-word;
    }

    .names p {
      font-size: 2vw;
    }

    @media screen and (max-width: 1000px) {
      .names {
        height: 60px;
      }
    }

    @media screen and (max-width: 750px) {
      .names {
        height: 45px;
      }
    }

    @media screen and (max-width: 510px) {
      .color-columns {
        width: 100%;
        padding: 15px;
      }

      .microorganism {
        font-size: 18px;
      }

      .chlorophyll {
        font-size: 18px;
      }

      .names {
        height: 60px;
      }

      .names p {
        font-size: 30px;
      }
    }

    .color-text {
      float: left;
    }

    .conc-text {
      float: right;
    }
  </style>
  <body>
    <script type="text/javascript">
      navBar();
    </script>

    <div class="container-fluid mt-4">
      <h2 class="text-center">Phytoplankton Concentration Visualizations</h2>

      <div id="chart1" class="plotly-graph-container"></div>
      <div id="chart2" class="plotly-graph-container"></div>
      <div id="chart3" class="plotly-graph-container"></div>
      <div id="chart4" class="plotly-graph-container"></div>

      <div class="btn-group" role="group">
        <button class="btn btn-secondary" onclick="setChartType('bar')">
          Stacked Bar
        </button>
        <button class="btn btn-secondary" onclick="setChartType('line')">
          Trendline
        </button>
      </div>

      <div
        id="active-chart"
        class="mt-4"
        style="width: 100%; height: 500px"
      ></div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <script src="static/js/dashboard.js"></script>
  </body>
</html>
