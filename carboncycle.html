<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stellwagen Bank National Marine Sanctuary Home</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="static/js/js_gallery.js"></script>
    <script src="js/main.js"></script>
    <link rel="stylesheet" href="static/css/gallery_css.css" />
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/navbar_css.css" />

    <style>
      #fader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
        background: rgb(2, 17, 27) !important;
        animation-duration: 1500ms;
        animation-timing-function: ease-in-out;
      }
      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      #fader.fade-out {
        opacity: 0;
        animation-name: fade-out;
      }

      #fader.fade-in {
        opacity: 1;
        animation-name: fade-in;
      }
    </style>
    <link rel="stylesheet" href="static/css/navbar_css.css" />
  </head>

  <body>
    <script type="text/javascript">
      navBar();
    </script>
    <svg id="fader"></svg>
    <img
      src="static/images/drawing/carbon_cycle.png"
      usemap="#workmap"
      style="width: 100%; position: relative; top: 8vh"
    />
    <map name="workmap" style="z-index: 100">
      <area
        shape="rect"
        coords="0,0,2000,4000"
        alt="Home"
        href="satellites.html"
      />
    </map>
  </body>
  <script>
    onload(fadeInPage());
    var element = document.getElementById("plankton");
    element.style.opacity = 0;
    element.style.transition = "opacity 1s";
    function act() {
      element.style.opacity = 1;
    }

    function fadeInPage() {
      if (!window.AnimationEvent) {
        return;
      }
      var fader = document.getElementById("fader");
      fader.classList.add("fade-out");
    }
  </script>
</html>
